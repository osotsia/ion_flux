name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies (LLVM & Enzyme)
        run: |
          brew update
          # ion_flux requires LLVM and the Enzyme AD plugin for JIT compilation
          brew install llvm enzyme sundials cmake
          
          # Force link LLVM so clang++ is immediately available in the PATH
          brew link --force llvm

      - name: Create and Activate Virtual Environment
        run: |
          # Create the strict environment matching the README
          python3.11 -m venv .venv
          
          # Tell GitHub Actions to use this environment for all future steps
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Install Python Build Tools & Dependencies
        run: |
          pip install --upgrade pip
          pip install maturin pytest pytest-asyncio pytest-benchmark numpy scipy pandas matplotlib

      - name: Run Rust Core Tests
        run: |
          # Executes the isolated numerical and linalg.rs unit tests natively
          cd rust
          cargo test

      - name: Build and Install ion_flux (Maturin)
        run: |
          # Compiles the Rust backend (_core) and installs the Python package locally
          maturin develop --release

      - name: Run Python Test Suite
        run: |
          # Runs all Python unit, integration, and AST JIT compiler tests
          pytest tests/ -v