name: Build, Test, and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  # ====================================================================
  # Job 1: Prepare Toolchain (Runs exactly once per OS)
  # ====================================================================
  prepare_toolchain:
    name: Prepare C++ Toolchain (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Linux Only)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sundials cmake ninja

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl

      - name: Free System Directory Permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /usr/local/lib /usr/local/include
          sudo chown -R $USER /usr/local/lib /usr/local/include

      - name: Cache C++ Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ion_flux/toolchain
            /usr/local/lib/libsundials*
            /usr/local/include/sundials
            /usr/local/include/nvector
            /usr/local/include/sunmatrix
            /usr/local/include/sunlinsol
            /opt/homebrew/lib/libsundials*
            /opt/homebrew/include/sundials
            /opt/homebrew/include/nvector
            /opt/homebrew/include/sunmatrix
            /opt/homebrew/include/sunlinsol
          key: toolchain-${{ runner.os }}-${{ runner.arch }}-llvm19.1.0-${{ hashFiles('.github/workflows/build_and_test_and_publish.yml') }}

      - name: Build SUNDIALS (Linux)
        if: runner.os == 'Linux' && steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/LLNL/sundials/releases/download/v7.1.1/sundials-7.1.1.tar.gz -o sundials.tar.gz
          tar -xzf sundials.tar.gz
          cd sundials-7.1.1
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DEXAMPLES_ENABLE_C=OFF \
            -DEXAMPLES_ENABLE_CXX=OFF \
            -DBUILD_SHARED_LIBS=ON \
            ..
          ninja
          sudo ninja install
          cd ../..
          rm -rf sundials-7.1.1 sundials.tar.gz

      - name: Build Hermetic LLVM/Enzyme Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          python3 python/ion_flux/cli.py install-toolchain


  # ====================================================================
  # Job 2: Build & Test (Matrix: macOS/Linux x Python versions)
  # ====================================================================
  build_and_test:
    name: Build & Test (${{ matrix.os }} / Py${{ matrix.python-version }})
    needs: prepare_toolchain
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Linux Only)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sundials cmake ninja

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl

      - name: Free System Directory Permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /usr/local/lib /usr/local/include
          sudo chown -R $USER /usr/local/lib /usr/local/include

      - name: Restore C++ Toolchain
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/ion_flux/toolchain
            /usr/local/lib/libsundials*
            /usr/local/include/sundials
            /usr/local/include/nvector
            /usr/local/include/sunmatrix
            /usr/local/include/sunlinsol
            /opt/homebrew/lib/libsundials*
            /opt/homebrew/include/sundials
            /opt/homebrew/include/nvector
            /opt/homebrew/include/sunmatrix
            /opt/homebrew/include/sunlinsol
          key: toolchain-${{ runner.os }}-${{ runner.arch }}-llvm19.1.0-${{ hashFiles('.github/workflows/build_and_test_and_publish.yml') }}
          fail-on-cache-miss: true

      - name: Update ldconfig (Linux)
        if: runner.os == 'Linux'
        run: sudo ldconfig

      - name: Create and Activate Virtual Environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Install Python Build Tools & Dependencies
        run: |
          pip install --upgrade pip
          pip install maturin auditwheel delocate pytest pytest-asyncio pytest-benchmark numpy scipy pandas matplotlib

      - name: Run Rust Core Tests
        run: |
          cd rust
          cargo test

      - name: Build Wheels and Install (Maturin)
        run: |
          # Clean old toolchain directory if it exists to prevent Maturin OS Error 2 on broken symlinks
          rm -rf python/ion_flux/compiler/toolchain
          
          # Scrub broken symlinks natively (Single-liner to avoid YAML/Python indentation clashes)
          python3 -c "import os; [os.unlink(os.path.join(r, f)) for r, d, fs in os.walk('python') for f in fs + d if os.path.islink(os.path.join(r, f)) and not os.path.exists(os.path.join(r, f))]"
          
          # Skip auditwheel/delocate phase to prevent OS Error 2 and Mach-O linking crashes
          maturin build --release -o dist --auditwheel skip
          maturin develop --release
          
          if [ "$(uname -s)" = "Linux" ]; then
            for whl in dist/*.whl; do
              # We explicitly manually repair Linux wheels only for SUNDIALS bundling
              auditwheel repair "$whl" -w dist_repaired/
            done
            rm dist/*.whl
            mv dist_repaired/*.whl dist/
          fi
          
          pip install dist/*.whl --force-reinstall

      - name: Run Python Test Suite
        run: |
          pytest tests/ -v

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 1


  # ====================================================================
  # Job 3: Publish to PyPI (Runs strictly on new releases)
  # ====================================================================
  publish_pypi:
    name: Publish Wheels to PyPI
    needs: build_and_test
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ion-flux
    permissions:
      id-token: write

    steps:
      - name: Download Wheel Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/